<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#2C2C2C" rx="20"/>
  
  <!-- Yellow accent circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#DCF763" stroke-width="2" opacity="0.2"/>
  
  <!-- Y letter form with lightning bolt design -->
  <g fill="#DCF763">
    <!-- Left arm of Y -->
    <path d="M 65 60 Q 85 85 100 100 L 100 140 L 115 140 L 115 100 Q 130 85 145 60 L 130 60 Q 115 75 100 90 Q 85 75 70 60 Z" />
    
    <!-- Lightning accent -->
    <path d="M 105 85 L 120 70 L 110 85 L 125 60" stroke="#DCF763" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>
  
  <!-- Glow effect -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#DCF763" stroke-width="1" opacity="0.1"/>
</svg>
